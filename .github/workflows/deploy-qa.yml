name: Deploy to QA



on:

  push:

    branches:

      - main



permissions:

  contents: read

  packages: write



env:

  REGISTRY: ghcr.io

  FRONTEND_IMAGE: ghcr.io/pjsimpson354/424final/frontend

  BACKEND_IMAGE: ghcr.io/pjsimpson354/424final/backend



jobs:

  build-and-deploy:

    runs-on: [self-hosted, linux, x64, qa]



    steps:

      - name: Checkout code

        uses: actions/checkout@v4



      - name: Log in to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ${{ env.REGISTRY }}

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}



      - name: Build and push frontend image

        uses: docker/build-push-action@v6

        with:

          context: ./frontend

          push: true

          tags: ${{ env.FRONTEND_IMAGE }}:latest



      - name: Build and push backend image

        uses: docker/build-push-action@v6

        with:

          context: ./backend

          push: true

          tags: ${{ env.BACKEND_IMAGE }}:latest



       - name: Deploy locally on QA runner

        run: |

          docker compose -f docker-compose.qa.yml down || true

          docker rm -f frontend-container backend-container nginx-container 2>/dev/null || true

          docker compose -f docker-compose.qa.yml pull

          docker compose -f docker-compose.qa.yml up -d

          docker image prune -f
