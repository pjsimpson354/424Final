services:

  frontend:

    image: ghcr.io/pjsimpson354/424FinalE/frontend:latest

    container_name: frontend-container

    networks:

      - app-network



  backend:

    image: ghcr.io/pjsimpson354/424Final/backend:latest

    container_name: backend-container

    networks:

      - app-network



  nginx:

    image: nginx:alpine

    container_name: nginx-container

    ports:

      - "80:80"

    volumes:

      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:

      - frontend

      - backend

    networks:

      - app-network

    healthcheck:

      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]

      interval: 30s

      timeout: 10s

      retries: 3



networks:

  app-network:

    driver: bridge
