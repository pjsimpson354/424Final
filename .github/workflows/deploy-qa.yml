name: Deploy to QA



on:

  push:

    branches:

      - main



permissions:

  contents: read

  packages: write



env:

  REGISTRY: ghcr.io

  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend



jobs:

  build-and-deploy:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout code

        uses: actions/checkout@v4



      - name: Log in to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ${{ env.REGISTRY }}

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}



      - name: Build and push frontend image

        uses: docker/build-push-action@v6

        with:

          context: ./frontend

          push: true

          tags: ${{ env.FRONTEND_IMAGE }}:latest



      - name: Build and push backend image

        uses: docker/build-push-action@v6

        with:

          context: ./backend

          push: true

          tags: ${{ env.BACKEND_IMAGE }}:latest



      - name: Copy deployment files to QA server

        uses: appleboy/scp-action@v0.1.7

        with:

          host: ${{ secrets.QA_HOST }}

          username: ${{ secrets.QA_USER }}

          key: ${{ secrets.QA_SSH_KEY }}

          source: "docker-compose.qa.yml,nginx/nginx.conf"

          target: "~/qa-app"



      - name: Deploy on QA server

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.QA_HOST }}

          username: ${{ secrets.QA_USER }}

          key: ${{ secrets.QA_SSH_KEY }}

          script: |

            cd ~/qa-app

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            docker compose -f docker-compose.qa.yml pull

            docker compose -f docker-compose.qa.yml up -d

            docker image prune -f
